name: Enterprise DevOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  devops-cycle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Stage 1 - Terraform Validation
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Stage 2 - Build Docker Image
        run: bash scripts/build.sh

      - name: Stage 3 - Run Local Integration
        run: bash scripts/run.sh

      - name: Stage 4 - Health Monitoring
        run: bash scripts/monitor.sh

      - name: Stage 5 - Virtual Deployment
        run: bash scripts/deploy.sh
